<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>{{title}}</title>

	<!-- Bootstrap theme (Bootswatch) -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootswatch/5.3.8/minty/bootstrap.min.css" integrity="sha512-2rlhob8L606Mt1c8oB20JR78cIX27wzWelusr5yq+4VX6ly4F3Tr88Vhj8B63yxB7k8i1BRq3fKaiaYESpo8rA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body id="top">
	<!-- navigation -->
	<nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
		<div class="container">
			<a class="navbar-brand" href="/">Documint</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarColor01" aria-controls="navbarColor01" aria-expanded="false" aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarColor01">
				<ul class="navbar-nav me-auto">
					<li class="nav-item">
						<a class="nav-link" href="/index.html">Home</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" href="/_page_list/index.html">Page Index</a>
					</li>
				</ul>
			</div>
		</div>
	</nav>

	<!-- content -->
	<div class="container my-4">
		<div class="row g-4">
			<!-- sidebar -->
			<aside class="col-12 col-lg-4 order-1 order-lg-2 text-break">
				<button class="btn btn-outline-primary w-100 d-lg-none" type="button" data-bs-toggle="collapse" data-bs-target="#documintSidebar" aria-controls="documintSidebar" aria-expanded="false">
					Toggle sidebar
				</button>
				<div class="collapse d-lg-block mt-3 mt-lg-0 sticky-lg-top" id="documintSidebar">
					{{sidebar}}
				</div>
			</aside>

			<!-- main page -->
			<main role="main" class="col-12 col-lg-8 order-2 order-lg-1">
				{{body}}
			</main>
		</div>

		<!-- footer -->
		<footer class="d-flex flex-column flex-sm-row justify-content-between gap-3 mt-5 p-4 border-top rounded-2 bg-body-tertiary" id="footer">
			<div class="small text-secondary">
				<p class="mb-1">Built with <a href="https://getbootstrap.com" rel="nofollow">Bootstrap</a> and <a href="https://bootswatch.com" rel="nofollow">Bootswatch</a>.</p>
				<p class="mb-0">Documint {{documint_version}} by Shun Moriya.</p>
			</div>
			<a class="btn btn-sm btn-outline-primary align-self-sm-start" href="#top">Back to top <span aria-hidden="true">&uarr;</span></a>
		</footer>
	</div>

	<!-- Bootstrap and diagram rendering -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.min.js" integrity="sha512-nKXmKvJyiGQy343jatQlzDprflyB5c+tKCzGP3Uq67v+lmzfnZUi/ZT+fc6ITZfSC5HhaBKUIvr/nTLCV+7F+Q==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
	<script src="https://cdn.jsdelivr.net/npm/mermaid@11.12.0/dist/mermaid.min.js"></script>
</body>

</html>
