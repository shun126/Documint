name: Deploy docs to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Pages artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Ensure PHP is available
        run: |
          if ! command -v php >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y php-cli
          fi
          php -v

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build docs with Documint
        shell: bash
        env:
          PAGES_BASE_URL: ${{ steps.pages.outputs.base_url }}
        run: |
          set -euo pipefail

          repo_name="${GITHUB_REPOSITORY#*/}"
          pages_base_path="/${repo_name}"
          if [[ "${repo_name}" == *.github.io ]]; then
            pages_base_path=""
          fi

          build_source="${RUNNER_TEMP}/documint-source"
          site_dir="${GITHUB_WORKSPACE}/_site"
          response_file="${RUNNER_TEMP}/documint-build-response.html"

          rm -rf "${build_source}" "${site_dir}"
          mkdir -p "${build_source}" "${site_dir}/docs"

          test -f _documint/parsedown/Parsedown.php

          cp -R _documint "${build_source}/_documint"
          cp -R docs "${build_source}/docs"
          cp README.md "${build_source}/README.md"

          pages_base_url="${PAGES_BASE_URL%/}"
          if [[ -z "${pages_base_url}" ]]; then
            pages_base_url="http://localhost"
          fi

          php "${build_source}/_documint/index.php" \
            --mode=readme-index \
            --root-url="${pages_base_url}" \
            --base-path="${pages_base_path}" \
            >"${response_file}" 2>&1

          if grep -q "<strong>ERROR:</strong>" "${response_file}"; then
            cat "${response_file}"
            exit 1
          fi

          test -d "${build_source}/_page_list"
          test -f "${build_source}/sitemap.xml"

          cp -R "${build_source}/docs/." "${site_dir}/docs/"
          cp -R "${build_source}/_page_list" "${site_dir}/_page_list"
          cp "${build_source}/sitemap.xml" "${site_dir}/sitemap.xml"
          cp "${build_source}/index.html" "${site_dir}/index.html"

          if [[ -n "${pages_base_path}" ]]; then
            find "${site_dir}" -type f -name '*.html' -print0 | xargs -0 sed -i \
              -e "s|href=\"/\"|href=\"${pages_base_path}/\"|g" \
              -e "s|href=\"/index.html\"|href=\"${pages_base_path}/index.html\"|g" \
              -e "s|href=\"/_page_list/|href=\"${pages_base_path}/_page_list/|g"
          fi

          test -f "${site_dir}/docs/index.html"
          test -f "${site_dir}/docs/markdown-basics.html"
          test -f "${site_dir}/docs/advanced-features.html"
          test -f "${site_dir}/_page_list/page_list.html"
          test -f "${site_dir}/sitemap.xml"
          test -f "${site_dir}/index.html"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
