name: Deploy docs to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Pages artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Ensure PHP is available
        run: |
          if ! command -v php >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y php-cli
          fi
          php -v

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build docs with Documint
        shell: bash
        env:
          PAGES_BASE_URL: ${{ steps.pages.outputs.base_url }}
        run: |
          set -euo pipefail

          repo_name="${GITHUB_REPOSITORY#*/}"
          pages_base_path="/${repo_name}"
          if [[ "${repo_name}" == *.github.io ]]; then
            pages_base_path=""
          fi

          build_source="${RUNNER_TEMP}/documint-source"
          site_dir="${GITHUB_WORKSPACE}/_site"
          response_file="${RUNNER_TEMP}/documint-build-response.html"
          server_log="${RUNNER_TEMP}/documint-server.log"

          rm -rf "${build_source}" "${site_dir}"
          mkdir -p "${build_source}" "${site_dir}/docs"

          test -f _documint/parsedown/Parsedown.php

          cp -R _documint "${build_source}/_documint"
          cp -R docs "${build_source}/docs"

          php -S 127.0.0.1:8000 -t "${build_source}" "${build_source}/_documint/index.php" >"${server_log}" 2>&1 &
          server_pid="$!"
          trap 'kill "${server_pid}" 2>/dev/null || true' EXIT

          request_path="${pages_base_path}/index.php"
          if [[ -z "${request_path}" ]]; then
            request_path="/index.php"
          fi
          build_url="http://127.0.0.1:8000${request_path}"

          for attempt in {1..20}; do
            if curl --fail --silent --show-error "${build_url}" --output "${response_file}"; then
              break
            fi
            sleep 1
          done

          if [[ ! -s "${response_file}" ]]; then
            echo "Documint did not return a response."
            cat "${server_log}"
            exit 1
          fi

          if grep -q "ERROR!!!" "${response_file}"; then
            cat "${response_file}"
            cat "${server_log}"
            exit 1
          fi

          cp -R "${build_source}/docs/." "${site_dir}/docs/"
          cp -R "${build_source}/_page_list" "${site_dir}/_page_list"
          cp "${build_source}/sitemap.xml" "${site_dir}/sitemap.xml"

          pages_base_url="${PAGES_BASE_URL%/}"
          local_base_url="http://127.0.0.1:8000${pages_base_path}"
          if [[ -n "${pages_base_url}" ]]; then
            sed -i "s|${local_base_url}|${pages_base_url}|g" "${site_dir}/sitemap.xml"
          fi

          if [[ -n "${pages_base_path}" ]]; then
            find "${site_dir}" -type f -name '*.html' -print0 | xargs -0 sed -i \
              -e "s|href=\"/\"|href=\"${pages_base_path}/\"|g" \
              -e "s|href=\"/index.html\"|href=\"${pages_base_path}/index.html\"|g" \
              -e "s|href=\"/_page_list/|href=\"${pages_base_path}/_page_list/|g"
          fi

          cat > "${site_dir}/index.html" <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <meta http-equiv="refresh" content="0; url=docs/index.html">
            <title>Documint</title>
          </head>
          <body>
            <p><a href="docs/index.html">Open the Documint tutorial</a></p>
          </body>
          </html>
          HTML

          test -f "${site_dir}/docs/index.html"
          test -f "${site_dir}/docs/markdown-basics.html"
          test -f "${site_dir}/docs/advanced-features.html"
          test -f "${site_dir}/_page_list/page_list.html"
          test -f "${site_dir}/sitemap.xml"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
