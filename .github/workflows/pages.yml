name: Deploy docs to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Pages artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Ensure PHP is available
        run: |
          if ! command -v php >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y php-cli
          fi
          php -v

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build docs with Documint
        shell: bash
        env:
          PAGES_ORIGIN: ${{ steps.pages.outputs.origin }}
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: |
          set -euo pipefail

          pages_origin="${PAGES_ORIGIN%/}"
          if [[ -z "${pages_origin}" ]]; then
            pages_origin="http://localhost"
          fi

          pages_base_path="${PAGES_BASE_PATH%/}"
          if [[ "${pages_base_path}" == "/" ]]; then
            pages_base_path=""
          elif [[ -n "${pages_base_path}" && "${pages_base_path}" != /* ]]; then
            pages_base_path="/${pages_base_path}"
          fi

          build_source="${RUNNER_TEMP}/documint-source"
          site_dir="${GITHUB_WORKSPACE}/_site"
          response_file="${RUNNER_TEMP}/documint-build-response.html"

          rm -rf "${build_source}" "${site_dir}"
          mkdir -p "${build_source}" "${site_dir}"

          test -f _documint/parsedown/Parsedown.php

          cp -R _documint "${build_source}/_documint"
          cp -R docs/. "${build_source}/"

          if ! php "${build_source}/_documint/index.php" \
            --id=admin \
            --password=password \
            --mode=readme-index \
            --root-url="${pages_origin}" \
            --base-path="${pages_base_path}" \
            >"${response_file}" 2>&1; then
            cat "${response_file}"
            exit 1
          fi

          test -d "${build_source}/_page_list"
          test -f "${build_source}/sitemap.xml"
          grep -Fq "<loc>${pages_origin}${pages_base_path}/index.html</loc>" "${build_source}/sitemap.xml"

          cp -R "${build_source}/_page_list" "${site_dir}/_page_list"
          cp -R "${build_source}/images" "${site_dir}/images"
          cp "${build_source}"/*.html "${site_dir}/"
          cp "${build_source}/sitemap.xml" "${site_dir}/sitemap.xml"

          if [[ -n "${pages_base_path}" ]]; then
            find "${site_dir}" -type f -name '*.html' -print0 | xargs -0 sed -i \
              -e "s|href=\"/\"|href=\"${pages_base_path}/\"|g" \
              -e "s|href=\"/index.html\"|href=\"${pages_base_path}/index.html\"|g" \
              -e "s|href=\"/_page_list/|href=\"${pages_base_path}/_page_list/|g"
          fi

          test -f "${site_dir}/index.html"
          test -f "${site_dir}/markdown-basics.html"
          test -f "${site_dir}/advanced-features.html"
          test -f "${site_dir}/category-workflow.html"
          test -f "${site_dir}/feature-reference.html"
          test -f "${site_dir}/_page_list/page_list.html"
          test -f "${site_dir}/sitemap.xml"
          test -d "${site_dir}/images"
          test ! -e "${site_dir}/README.html"
          test ! -e "${site_dir}/docs/index.html"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
